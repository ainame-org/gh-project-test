name: Cat file on In Progress

on:
  projects_v2_item:
    types: [edited]

jobs:
  cat-file:
    if: |
      github.event.changes.field_value.field_name == 'Status' &&
      github.event.projects_v2_item.content_type == 'Issue' &&
      github.event.changes.field_value.to.name == 'In Progress'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve issue file path and project IDs
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ITEM_ID="${{ github.event.projects_v2_item.node_id }}"

          file=$(gh project item-list 3 --owner ainame --format json --limit 200 \
            | jq -r --arg id "$ITEM_ID" '.items[] | select(.id == $id) | .title')
          project_id=$(gh project view 3 --owner ainame --format json | jq -r '.id')
          fields=$(gh project field-list 3 --owner ainame --format json)
          field_id=$(echo "$fields" | jq -r '.fields[] | select(.name == "Status") | .id')
          done_id=$(echo "$fields" | jq -r '.fields[] | select(.name == "Status") | .options[] | select(.name == "Done") | .id')

          echo "file=$file" >> $GITHUB_OUTPUT
          echo "project_id=$project_id" >> $GITHUB_OUTPUT
          echo "field_id=$field_id" >> $GITHUB_OUTPUT
          echo "done_id=$done_id" >> $GITHUB_OUTPUT

      - name: Cat the file
        run: cat "${{ steps.resolve.outputs.file }}"

      - name: Mark project item as Done
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh project item-edit \
            --id "${{ github.event.projects_v2_item.node_id }}" \
            --project-id "${{ steps.resolve.outputs.project_id }}" \
            --field-id "${{ steps.resolve.outputs.field_id }}" \
            --single-select-option-id "${{ steps.resolve.outputs.done_id }}"
