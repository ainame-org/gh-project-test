name: Cat file on In Progress

on:
  projects_v2_item:
    types: [edited]

jobs:
  cat-file:
    if: |
      github.event.changes.field_value.field_name == 'Status' &&
      github.event.projects_v2_item.content_type == 'Issue' &&
      github.event.changes.field_value.to.name == 'In Progress'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get file path from issue title
        id: get-file
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          file=$(gh api graphql -f query='
            query($nodeId: ID!) {
              node(id: $nodeId) {
                ... on Issue {
                  title
                }
              }
            }
          ' -f nodeId="${{ github.event.projects_v2_item.content_node_id }}" --jq '.data.node.title')
          echo "file=$file" >> $GITHUB_OUTPUT

      - name: Cat the file
        run: cat "${{ steps.get-file.outputs.file }}"

      - name: Mark project item as Done
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROJECT_OWNER="ainame"
          PROJECT_NUMBER=3
          ITEM_ID="${{ github.event.projects_v2_item.node_id }}"

          # Fetch project ID, Status field ID, and Done option ID
          result=$(gh api graphql -f query='
            query($owner: String!, $number: Int!) {
              user(login: $owner) {
                projectV2(number: $number) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                }
              }
            }
          ' -f owner="$PROJECT_OWNER" -F number="$PROJECT_NUMBER")

          PROJECT_ID=$(echo "$result" | jq -r '.data.user.projectV2.id')
          FIELD_ID=$(echo "$result" | jq -r '.data.user.projectV2.fields.nodes[] | select(.name == "Status") | .id')
          DONE_OPTION_ID=$(echo "$result" | jq -r '.data.user.projectV2.fields.nodes[] | select(.name == "Status") | .options[] | select(.name == "Done") | .id')

          gh api graphql -f query='
            mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $projectId
                itemId: $itemId
                fieldId: $fieldId
                value: { singleSelectOptionId: $optionId }
              }) {
                projectV2Item { id }
              }
            }
          ' -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" -f fieldId="$FIELD_ID" -f optionId="$DONE_OPTION_ID"
